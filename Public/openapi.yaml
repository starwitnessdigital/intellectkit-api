openapi: 3.0.3

info:
  title: IntellectKit API
  version: 1.0.0
  description: |
    IntellectKit provides clean, structured data from the web — purpose-built for AI agents,
    automation pipelines, and developer tools.

    ## What this API does
    - **Extract** article content, product data, page metadata, links, and clean text from any URL
    - **Validate** email addresses and look up DNS records
    - **Inspect** IP geolocation, SSL certificates, and URL redirect chains
    - **Transform** text with hashing (md5/sha1/sha256/sha512), encoding/decoding (base64/URL/HTML), and JSON validation

    ## Agent integration
    All endpoints use GET requests with a single query parameter. Responses are typed JSON
    with predictable schemas — null fields are always present (never missing). This makes
    IntellectKit trivial to wrap as LLM tool definitions in any agent framework.

    ## Authentication
    Pass your API key in the `X-API-Key` header on every `/v1/` request.
    Demo keys for testing:
    - `ik_free_demo_key_123` — 100 req/day
    - `ik_starter_demo_key_456` — 1,000 req/day
    - `ik_pro_demo_key_789` — 10,000 req/day

  contact:
    name: IntellectKit Support
    url: https://api.intellectkit.dev
  license:
    name: Proprietary

servers:
  - url: https://api.intellectkit.dev
    description: Production

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Your IntellectKit API key. Format: `ik_<tier>_<key>`.
        Obtain a key at https://api.intellectkit.dev.

  schemas:
    # ── Shared ─────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error, reason]
      properties:
        error:
          type: string
          example: Bad Request
        reason:
          type: string
          example: "Missing required query parameter: url"

    # ── Extract ────────────────────────────────────────────────
    ArticleExtractionResponse:
      type: object
      description: Extracted article content from a web page.
      required: [url, extractedAt]
      properties:
        url:
          type: string
          format: uri
          example: "https://example.com/article"
        title:
          type: string
          nullable: true
          example: "How AI Is Changing Software Development"
        author:
          type: string
          nullable: true
          example: "Jane Smith"
        publishedDate:
          type: string
          nullable: true
          example: "2024-03-15T09:00:00Z"
        bodyText:
          type: string
          nullable: true
          description: Full article body text with noise (nav, ads, footer) removed.
          example: "The pace of AI adoption in software development..."
        images:
          type: array
          items:
            type: string
            format: uri
          example: ["https://example.com/images/hero.jpg"]
        wordCount:
          type: integer
          nullable: true
          example: 1240
        readingTimeMinutes:
          type: integer
          nullable: true
          example: 7
        summary:
          type: string
          nullable: true
          description: First ~300 characters of body text — useful as a preview for agents.
          example: "The pace of AI adoption in software development has accelerated..."
        extractedAt:
          type: string
          format: date-time
          example: "2024-06-01T12:34:56Z"

    ProductExtractionResponse:
      type: object
      description: Extracted product data from an e-commerce page.
      required: [url, extractedAt]
      properties:
        url:
          type: string
          format: uri
        name:
          type: string
          nullable: true
          example: "Wireless Noise-Cancelling Headphones"
        price:
          type: string
          nullable: true
          example: "349.99"
        currency:
          type: string
          nullable: true
          example: "USD"
        description:
          type: string
          nullable: true
          example: "Premium over-ear headphones with 30-hour battery life."
        images:
          type: array
          items:
            type: string
            format: uri
        brand:
          type: string
          nullable: true
          example: "SoundCo"
        availability:
          type: string
          nullable: true
          example: "InStock"
        ratingValue:
          type: string
          nullable: true
          example: "4.7"
        reviewCount:
          type: string
          nullable: true
          example: "2341"
        extractedAt:
          type: string
          format: date-time

    MetadataExtractionResponse:
      type: object
      description: Open Graph, Twitter card, JSON-LD, and other metadata from a page.
      required: [url, ogTags, twitterTags, jsonLD, extractedAt]
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
          nullable: true
          example: "Example Domain"
        description:
          type: string
          nullable: true
          example: "This domain is for illustrative examples."
        ogTags:
          type: object
          additionalProperties:
            type: string
          example:
            og:title: "Example Domain"
            og:type: "website"
        twitterTags:
          type: object
          additionalProperties:
            type: string
          example:
            twitter:card: "summary_large_image"
        canonicalURL:
          type: string
          format: uri
          nullable: true
        language:
          type: string
          nullable: true
          example: "en"
        favicon:
          type: string
          format: uri
          nullable: true
        jsonLD:
          type: array
          description: Raw JSON-LD script contents as strings.
          items:
            type: string
        extractedAt:
          type: string
          format: date-time

    ExtractedLink:
      type: object
      required: [href, isExternal]
      properties:
        href:
          type: string
          format: uri
          example: "https://example.com/about"
        text:
          type: string
          nullable: true
          example: "About Us"
        rel:
          type: string
          nullable: true
          example: "noopener"
        isExternal:
          type: boolean
          example: false

    LinksExtractionResponse:
      type: object
      required: [url, totalLinks, internalLinks, externalLinks, links, extractedAt]
      properties:
        url:
          type: string
          format: uri
        totalLinks:
          type: integer
          example: 42
        internalLinks:
          type: integer
          example: 18
        externalLinks:
          type: integer
          example: 24
        links:
          type: array
          items:
            $ref: '#/components/schemas/ExtractedLink'
        extractedAt:
          type: string
          format: date-time

    TextExtractionResponse:
      type: object
      description: Clean readable text with navigation, ads, and UI chrome stripped.
      required: [url, text, wordCount, characterCount, extractedAt]
      properties:
        url:
          type: string
          format: uri
        text:
          type: string
          description: Stripped prose text, ready for LLM consumption.
          example: "Welcome to Example Domain. This domain is for use in illustrative examples..."
        wordCount:
          type: integer
          example: 312
        characterCount:
          type: integer
          example: 1847
        extractedAt:
          type: string
          format: date-time

    # ── Tools ──────────────────────────────────────────────────
    EmailValidationResponse:
      type: object
      required: [email, isValid]
      properties:
        email:
          type: string
          example: "user@example.com"
        isValid:
          type: boolean
          example: true
        reason:
          type: string
          nullable: true
          description: Human-readable explanation when isValid is false.
          example: "Domain part is missing"
        domain:
          type: string
          nullable: true
          example: "example.com"
        local:
          type: string
          nullable: true
          description: The part before the @ symbol.
          example: "user"

    DNSRecord:
      type: object
      required: [type, value]
      properties:
        type:
          type: string
          enum: [A, MX, TXT, NS, CNAME]
          example: "A"
        value:
          type: string
          example: "93.184.216.34"

    DNSLookupResponse:
      type: object
      required: [domain, records, checkedAt]
      properties:
        domain:
          type: string
          example: "example.com"
        records:
          type: array
          items:
            $ref: '#/components/schemas/DNSRecord'
        checkedAt:
          type: string
          format: date-time

    # ── New utility tools ─────────────────────────────────────
    IPInfoResponse:
      type: object
      required: [ip, checkedAt]
      properties:
        ip:
          type: string
          example: "8.8.8.8"
        country:
          type: string
          nullable: true
          example: "United States"
        countryCode:
          type: string
          nullable: true
          example: "US"
        region:
          type: string
          nullable: true
          example: "VA"
        regionName:
          type: string
          nullable: true
          example: "Virginia"
        city:
          type: string
          nullable: true
          example: "Ashburn"
        isp:
          type: string
          nullable: true
          example: "Google LLC"
        org:
          type: string
          nullable: true
          example: "Google Public DNS"
        asNumber:
          type: string
          nullable: true
          example: "AS15169 Google LLC"
        timezone:
          type: string
          nullable: true
          example: "America/New_York"
        lat:
          type: number
          nullable: true
          example: 39.0438
        lon:
          type: number
          nullable: true
          example: -77.4874
        checkedAt:
          type: string
          format: date-time

    SSLInfoResponse:
      type: object
      required: [domain, checkedAt]
      properties:
        domain:
          type: string
          example: "example.com"
        issuer:
          type: string
          nullable: true
          example: "C=US, O=DigiCert Inc, CN=DigiCert Global G2 TLS RSA SHA256 2020 CA1"
        subject:
          type: string
          nullable: true
          example: "CN=example.com"
        validFrom:
          type: string
          nullable: true
          example: "Jan 15 00:00:00 2024 GMT"
        validTo:
          type: string
          nullable: true
          example: "Feb 15 23:59:59 2025 GMT"
        daysUntilExpiry:
          type: integer
          nullable: true
          example: 120
        serialNumber:
          type: string
          nullable: true
          example: "0F3E4A2B1C..."
        signatureAlgorithm:
          type: string
          nullable: true
          example: "sha256WithRSAEncryption"
        checkedAt:
          type: string
          format: date-time

    RedirectHop:
      type: object
      required: [url, statusCode]
      properties:
        url:
          type: string
          format: uri
          example: "http://example.com"
        statusCode:
          type: integer
          example: 301

    URLInfoResponse:
      type: object
      required: [url, queryParams, isHttps, redirectChain, checkedAt]
      properties:
        url:
          type: string
          format: uri
        scheme:
          type: string
          nullable: true
          example: "https"
        domain:
          type: string
          nullable: true
          example: "api.example.com"
        subdomain:
          type: string
          nullable: true
          example: "api"
        path:
          type: string
          nullable: true
          example: "/v1/users"
        queryParams:
          type: object
          additionalProperties:
            type: string
          example:
            page: "2"
            limit: "10"
        fragment:
          type: string
          nullable: true
          example: "section-2"
        isHttps:
          type: boolean
          example: true
        redirectChain:
          type: array
          description: Each hop followed during redirect resolution, including the final destination.
          items:
            $ref: '#/components/schemas/RedirectHop'
        checkedAt:
          type: string
          format: date-time

    HashResponse:
      type: object
      required: [text, algorithm, hash]
      properties:
        text:
          type: string
          example: "hello"
        algorithm:
          type: string
          enum: [md5, sha1, sha256, sha512]
          example: "sha256"
        hash:
          type: string
          example: "2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"

    EncodeDecodeResponse:
      type: object
      required: [input, output, format, operation]
      properties:
        input:
          type: string
          example: "hello world"
        output:
          type: string
          example: "aGVsbG8gd29ybGQ="
        format:
          type: string
          enum: [base64, url, html]
          example: "base64"
        operation:
          type: string
          enum: [encode, decode]
          example: "encode"

    JSONStructureSummary:
      type: object
      required: [type, depth]
      properties:
        type:
          type: string
          enum: [object, array, scalar]
          example: "object"
        keyCount:
          type: integer
          nullable: true
          example: 5
        keys:
          type: array
          nullable: true
          items:
            type: string
          example: ["id", "name", "email"]
        arrayLength:
          type: integer
          nullable: true
          example: 3
        depth:
          type: integer
          description: Maximum nesting depth of the JSON structure.
          example: 2

    JSONValidateResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
          example: true
        error:
          type: string
          nullable: true
          description: Parse error message when valid is false.
          example: "The data couldn't be read because it isn't in the correct format."
        structure:
          nullable: true
          $ref: '#/components/schemas/JSONStructureSummary'

    # ── Stub responses ─────────────────────────────────────────
    ComingSoonResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          example: "coming_soon"
        message:
          type: string
          example: "This endpoint is under development."

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      description: Returns service status. No authentication required.
      security: []
      tags: [System]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: intellectkit-api

  /v1/openapi:
    get:
      operationId: getOpenAPISpec
      summary: OpenAPI specification
      description: Returns this OpenAPI 3.0 specification in YAML. No authentication required.
      security: []
      tags: [System]
      responses:
        '200':
          description: OpenAPI YAML spec
          content:
            application/yaml:
              schema:
                type: string

  # ── Extraction endpoints ──────────────────────────────────────
  /v1/extract/article:
    get:
      operationId: extractArticle
      summary: Extract article content
      description: |
        Extracts structured article data from a web page URL.

        Returns title, author, publish date, clean body text, images, word count,
        estimated reading time, and a short summary.

        **Agent tip:** Use the `summary` field for quick relevance checks before
        processing the full `bodyText`.
      tags: [Extraction]
      parameters:
        - name: url
          in: query
          required: true
          description: The URL of the article to extract. Must start with http:// or https://.
          schema:
            type: string
            format: uri
          example: "https://techcrunch.com/2024/01/15/ai-trends"
      responses:
        '200':
          description: Article extracted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleExtractionResponse'
              example:
                url: "https://techcrunch.com/2024/01/15/ai-trends"
                title: "The Top AI Trends of 2024"
                author: "Sarah Connor"
                publishedDate: "2024-01-15T08:00:00Z"
                bodyText: "Artificial intelligence continued to reshape..."
                images: ["https://techcrunch.com/wp-content/uploads/2024/01/ai-hero.jpg"]
                wordCount: 1450
                readingTimeMinutes: 8
                summary: "Artificial intelligence continued to reshape industries in 2024..."
                extractedAt: "2024-06-01T12:00:00Z"
        '400':
          description: Missing or invalid url parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Could not fetch the target URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/extract/product:
    get:
      operationId: extractProduct
      summary: Extract product data
      description: |
        Extracts structured product information from an e-commerce page.

        Uses structured data (Schema.org), Open Graph tags, and heuristic fallbacks
        to extract name, price, currency, brand, availability, rating, and images.

        **Agent tip:** Works best on product detail pages. Category/listing pages
        will return partial data for the first product found.
      tags: [Extraction]
      parameters:
        - name: url
          in: query
          required: true
          description: The URL of the product page to extract.
          schema:
            type: string
            format: uri
          example: "https://www.amazon.com/dp/B09N3ZTJN9"
      responses:
        '200':
          description: Product data extracted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductExtractionResponse'
        '400':
          description: Missing or invalid url parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Could not fetch the target URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/extract/metadata:
    get:
      operationId: extractMetadata
      summary: Extract page metadata
      description: |
        Extracts Open Graph tags, Twitter card tags, JSON-LD structured data,
        canonical URL, language, and favicon from any web page.

        **Agent tip:** JSON-LD fields often contain rich structured data
        (Organization, Article, Product, BreadcrumbList) that LLMs can reason over directly.
      tags: [Extraction]
      parameters:
        - name: url
          in: query
          required: true
          description: The URL of the page to extract metadata from.
          schema:
            type: string
            format: uri
          example: "https://stripe.com"
      responses:
        '200':
          description: Metadata extracted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataExtractionResponse'
        '400':
          description: Missing or invalid url parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Could not fetch the target URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/extract/links:
    get:
      operationId: extractLinks
      summary: Extract all links from a page
      description: |
        Extracts all hyperlinks from a web page, classified as internal or external,
        with anchor text and rel attributes.

        Filters out fragment-only links, javascript:, mailto:, and tel: links.

        **Agent tip:** Use `isExternal: false` links to discover internal site structure.
        Use `isExternal: true` links to find what sources a page references.
      tags: [Extraction]
      parameters:
        - name: url
          in: query
          required: true
          description: The URL of the page to extract links from.
          schema:
            type: string
            format: uri
          example: "https://news.ycombinator.com"
      responses:
        '200':
          description: Links extracted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinksExtractionResponse'
        '400':
          description: Missing or invalid url parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Could not fetch the target URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/extract/text:
    get:
      operationId: extractText
      summary: Extract clean readable text
      description: |
        Strips navigation, headers, footers, sidebars, ads, cookie banners, and
        other UI chrome, returning only the readable prose from the page.

        **Agent tip:** This is the most token-efficient extraction endpoint — ideal
        for feeding page content directly into an LLM context window. Returns word
        count so agents can estimate token usage before processing.
      tags: [Extraction]
      parameters:
        - name: url
          in: query
          required: true
          description: The URL of the page to extract text from.
          schema:
            type: string
            format: uri
          example: "https://en.wikipedia.org/wiki/Artificial_intelligence"
      responses:
        '200':
          description: Text extracted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextExtractionResponse'
        '400':
          description: Missing or invalid url parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Could not fetch the target URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Tools endpoints ───────────────────────────────────────────
  /v1/tools/validate-email:
    get:
      operationId: validateEmail
      summary: Validate an email address
      description: |
        Validates an email address format using RFC 5321 rules.

        Checks for: @ symbol presence, non-empty local part, valid domain format,
        length limits (local max 64 chars, total max 254 chars), and regex pattern.

        **Agent tip:** Use `isValid: false` + `reason` to give users a specific,
        actionable error message rather than a generic "invalid email" response.
      tags: [Tools]
      parameters:
        - name: email
          in: query
          required: true
          description: The email address to validate.
          schema:
            type: string
          example: "user@example.com"
      responses:
        '200':
          description: Validation result (always 200 — check isValid field)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailValidationResponse'
              examples:
                valid:
                  summary: Valid email
                  value:
                    email: "user@example.com"
                    isValid: true
                    reason: null
                    domain: "example.com"
                    local: "user"
                invalid:
                  summary: Invalid email
                  value:
                    email: "not-an-email"
                    isValid: false
                    reason: "Missing @ symbol"
                    domain: null
                    local: null
        '400':
          description: Missing email query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tools/dns:
    get:
      operationId: dnsLookup
      summary: Look up DNS records for a domain
      description: |
        Queries A, MX, TXT, NS, and CNAME records for any domain using `dig`.

        **Agent tip:** Use TXT records to verify domain ownership or find SPF/DKIM
        configuration. Use MX records to identify the email provider for a domain.
        Use A records to resolve a domain to its IP address.
      tags: [Tools]
      parameters:
        - name: domain
          in: query
          required: true
          description: The domain name to look up (e.g. example.com, not a full URL).
          schema:
            type: string
          example: "example.com"
      responses:
        '200':
          description: DNS records retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSLookupResponse'
              example:
                domain: "example.com"
                records:
                  - type: "A"
                    value: "93.184.216.34"
                  - type: "MX"
                    value: "0 ."
                  - type: "NS"
                    value: "a.iana-servers.net."
                checkedAt: "2024-06-01T12:00:00Z"
        '400':
          description: Missing or invalid domain parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tools/ip-info:
    get:
      operationId: ipInfo
      summary: IP geolocation and network info
      description: |
        Returns geolocation and network data for an IPv4 or IPv6 address.
        Uses ip-api.com (free, no key required, ~45 req/min from server-side).

        Returns country, region, city, ISP, organization, AS number, timezone, and lat/lon.

        **Agent tip:** Pass `ip=self` or omit the ip parameter to look up the request's own IP.
        Useful for agents that need to geolocate user-provided addresses for fraud scoring,
        content personalization, or shipping restriction checks.
      tags: [Tools]
      parameters:
        - name: ip
          in: query
          required: true
          description: IPv4 or IPv6 address to look up.
          schema:
            type: string
          example: "8.8.8.8"
      responses:
        '200':
          description: IP info retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPInfoResponse'
              example:
                ip: "8.8.8.8"
                country: "United States"
                countryCode: "US"
                region: "VA"
                regionName: "Virginia"
                city: "Ashburn"
                isp: "Google LLC"
                org: "Google Public DNS"
                asNumber: "AS15169 Google LLC"
                timezone: "America/New_York"
                lat: 39.0438
                lon: -77.4874
                checkedAt: "2024-06-01T12:00:00Z"
        '400':
          description: Missing or invalid ip parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: IP geolocation service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tools/ssl:
    get:
      operationId: sslInfo
      summary: SSL certificate info for a domain
      description: |
        Connects to the domain on port 443 and reads the TLS certificate details.

        Returns issuer, subject, validity period, days until expiry, serial number,
        and signature algorithm.

        **Agent tip:** Check `daysUntilExpiry` to alert on soon-to-expire certificates
        (common threshold: 30 days). A negative value means the certificate has already expired.
      tags: [Tools]
      parameters:
        - name: domain
          in: query
          required: true
          description: Domain name to check (e.g. example.com — no https:// prefix).
          schema:
            type: string
          example: "example.com"
      responses:
        '200':
          description: SSL certificate info retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSLInfoResponse'
        '400':
          description: Missing or invalid domain parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tools/url-info:
    get:
      operationId: urlInfo
      summary: Parse and analyze a URL
      description: |
        Parses the URL into its components and follows any redirects to build the full chain.

        Returns scheme, domain, subdomain, path, query parameters (as a key/value map),
        fragment, isHttps flag, and the redirect chain with status codes.

        **Agent tip:** Use `redirectChain` to detect URL shorteners, affiliate trackers,
        or unexpected third-party redirects. Use `queryParams` to extract UTM parameters
        or paginated API call parameters without writing a URL parser.
      tags: [Tools]
      parameters:
        - name: url
          in: query
          required: true
          description: The URL to analyze. Must start with http:// or https://.
          schema:
            type: string
            format: uri
          example: "https://api.example.com/v1/users?page=2&limit=10#results"
      responses:
        '200':
          description: URL parsed and analyzed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/URLInfoResponse'
        '400':
          description: Missing or invalid url parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tools/hash:
    get:
      operationId: hashText
      summary: Hash text with common algorithms
      description: |
        Computes a hash of the input text using the specified algorithm.

        Supported algorithms: `md5`, `sha1`, `sha256` (default), `sha512`.

        **Agent tip:** Use `sha256` for integrity verification and checksums.
        Use `md5` only for legacy compatibility — not for security purposes.
        Useful for generating cache keys, content fingerprints, or verifying
        that a value matches an expected hash without storing the plaintext.
      tags: [Tools]
      parameters:
        - name: text
          in: query
          required: true
          description: The text to hash.
          schema:
            type: string
          example: "hello"
        - name: algorithm
          in: query
          required: false
          description: Hash algorithm. Defaults to sha256.
          schema:
            type: string
            enum: [md5, sha1, sha256, sha512]
            default: sha256
          example: "sha256"
      responses:
        '200':
          description: Hash computed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HashResponse'
              example:
                text: "hello"
                algorithm: "sha256"
                hash: "2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"
        '400':
          description: Missing text parameter or unsupported algorithm
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tools/encode:
    get:
      operationId: encodeText
      summary: Encode text (base64, URL, HTML)
      description: |
        Encodes text using the specified format.

        Supported formats:
        - `base64` — Standard base64 encoding (RFC 4648)
        - `url` — Percent-encoding for query strings
        - `html` — HTML entity encoding (&amp;, &lt;, &gt;, &quot;, &#39;)

        **Agent tip:** Use `url` encoding before inserting user-provided values into
        query strings. Use `html` encoding before inserting untrusted text into HTML.
      tags: [Tools]
      parameters:
        - name: text
          in: query
          required: true
          description: The text to encode.
          schema:
            type: string
          example: "hello world"
        - name: format
          in: query
          required: false
          description: Encoding format. Defaults to base64.
          schema:
            type: string
            enum: [base64, url, html]
            default: base64
          example: "base64"
      responses:
        '200':
          description: Text encoded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncodeDecodeResponse'
              example:
                input: "hello world"
                output: "aGVsbG8gd29ybGQ="
                format: "base64"
                operation: "encode"
        '400':
          description: Missing text or unsupported format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tools/decode:
    get:
      operationId: decodeText
      summary: Decode text (base64, URL, HTML)
      description: |
        Decodes text using the specified format.

        Supported formats:
        - `base64` — Standard base64 decoding (accepts padding variations)
        - `url` — Percent-decoding
        - `html` — HTML entity decoding (&amp;, &lt;, &gt;, &quot;, &#39;, &nbsp;, etc.)

        **Agent tip:** Use this when you receive base64-encoded webhook payloads, JWT
        components, or URL-encoded form data that needs to be read as plain text.
      tags: [Tools]
      parameters:
        - name: text
          in: query
          required: true
          description: The text to decode.
          schema:
            type: string
          example: "aGVsbG8gd29ybGQ="
        - name: format
          in: query
          required: false
          description: Decoding format. Defaults to base64.
          schema:
            type: string
            enum: [base64, url, html]
            default: base64
          example: "base64"
      responses:
        '200':
          description: Text decoded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncodeDecodeResponse'
              example:
                input: "aGVsbG8gd29ybGQ="
                output: "hello world"
                format: "base64"
                operation: "decode"
        '400':
          description: Missing text, unsupported format, or invalid encoded input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tools/json-validate:
    post:
      operationId: jsonValidate
      summary: Validate JSON and summarize structure
      description: |
        Send raw JSON in the request body. Returns whether it parses successfully,
        an error message if not, and a structure summary (type, top-level keys, depth,
        array length).

        **Agent tip:** Use before storing or forwarding untrusted JSON payloads.
        The `structure` summary lets agents understand the shape of large JSON blobs
        without processing the full payload — useful for routing decisions or schema matching.
      tags: [Tools]
      requestBody:
        required: true
        description: Raw JSON to validate. Send as plain `application/json` body.
        content:
          application/json:
            schema:
              type: object
            example:
              name: "Alice"
              age: 30
              tags: ["admin", "user"]
      responses:
        '200':
          description: Validation result (always 200 — check valid field)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSONValidateResponse'
              examples:
                valid:
                  summary: Valid JSON
                  value:
                    valid: true
                    error: null
                    structure:
                      type: object
                      keyCount: 3
                      keys: ["age", "name", "tags"]
                      arrayLength: null
                      depth: 2
                invalid:
                  summary: Invalid JSON
                  value:
                    valid: false
                    error: "The data couldn't be read because it isn't in the correct format."
                    structure: null
        '400':
          description: Empty or missing request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Daily rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

